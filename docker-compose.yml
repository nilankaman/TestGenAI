services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: testgen
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/testgen
      SPRING_DATA_REDIS_HOST: redis
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - postgres
      - redis