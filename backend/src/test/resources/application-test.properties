# H2 in-memory DB (Postgres mode)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Disable Flyway & Liquibase for tests
spring.flyway.enabled=false
spring.liquibase.enabled=false

# JWT Configuration for tests
jwt.secret=test-secret-for-tests
jwt.expiration-ms=60000  # 60 seconds, safer for tests

# Dummy external API keys
groq.api.key=dummy
groq.api.base-url=https://dummy-api.com
groq.api.model=dummy-model
groq.api.max-tokens=10
groq.api.temperature=0.1

openai.api.key=dummy
openai.api.model=gpt-4o-mini

# Application URLs
app.base-url=http://localhost:5173
cors.allowed-origins=http://localhost:5173


spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration