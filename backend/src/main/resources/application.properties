# Server Configuration
server.port=${PORT:8081}
spring.application.name=testgen-ai

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/testgen_db
spring.datasource.username=${DB_USERNAME:testgen_user}
spring.datasource.password=${DB_PASSWORD:testgen_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update  
spring.jpa.show-sql=true              
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# safe for existing DB
spring.flyway.baseline-on-migrate=true

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application URLs
app.base-url=http://localhost:5173
cors.allowed-origins=http://localhost:5173

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# Groq AI API Configuration
ai.provider=groq
groq.api.key=${GROQ_API_KEY}
groq.api.base-url=https://api.groq.com/openai/v1
groq.api.model=llama-3.3-70b-versatile
groq.api.max-tokens=2048
groq.api.temperature=0.3

# Logging-
logging.level.root=INFO
logging.level.com.testgen=DEBUG

# Redis (required for caching, rate limiting, job queue)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# OpenAI fallback (optional — leave blank to disable)
openai.api.key=${OPENAI_API_KEY}
openai.api.model=gpt-4o-mini

# Circuit breaker
resilience4j.circuitbreaker.instances.groq.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.groq.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.groq.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.groq.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.groq.sliding-window-size=10

# Actuator / Prometheus metrics
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

local.storage.path=D:/testgen_uploads/

spring.profiles.include=secrets